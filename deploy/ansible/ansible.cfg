[defaults]
inventory = inventories/production/hosts.ini
host_key_checking = False
retry_files_enabled = False
deprecation_warnings = False
# Sortie lisible en YAML via le callback par défaut (l'ancien plugin
# community.general.yaml a été retiré depuis ansible-core 2.13+).
result_format = yaml

[ssh_connection]
pipelining = True
